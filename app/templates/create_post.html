<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1051868467240944"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
    <meta name="description" content="Create a new post for Orumba North LGA.">
    <title>Create Post — Orumba North LGA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/global-theme.css">
    <link rel="stylesheet" href="/static/css/navbar.css">
    <link rel="stylesheet" href="/static/css/mobile-global.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root { --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding-top: 80px;
            padding-bottom: 2rem;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: clamp(1.6rem, 5vw, 2.5rem);
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .form-container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 1rem;
            border-radius: var(--radius);
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-family: var(--font-body);
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            box-sizing: border-box;
        }
        input[type="text"]::placeholder { color: rgba(255,255,255,0.45); }
        input[type="text"]:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
        }

        #editor-container {
            height: clamp(250px, 40vh, 400px);
            background: rgba(255,255,255,0.06);
            border-radius: var(--radius);
            margin-bottom: 1.25rem;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
        }

        .ql-toolbar.ql-snow {
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
            padding: 0.5rem 0.75rem;
        }
        .ql-toolbar.ql-snow .ql-picker-label,
        .ql-toolbar.ql-snow .ql-picker-item,
        .ql-toolbar.ql-snow button { color: #fff; stroke: #fff; }
        .ql-toolbar.ql-snow .ql-stroke { stroke: #fff; }
        .ql-toolbar.ql-snow .ql-fill { fill: #fff; }
        .ql-toolbar.ql-snow button:hover .ql-stroke,
        .ql-toolbar.ql-snow .ql-active .ql-stroke { stroke: #22c55e; }
        .ql-container.ql-snow { border: none; background: transparent; }
        .ql-editor { color: #fff; font-size: 1rem; font-family: var(--font-body); min-height: clamp(200px, 35vh, 350px); }
        .ql-editor.ql-blank::before { color: rgba(255,255,255,0.4); font-style: normal; }

        .btn-submit {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            border: none;
            padding: 0.85rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: var(--radius);
            cursor: pointer;
            font-family: var(--font-body);
            transition: all 0.25s ease;
            box-shadow: 0 8px 24px rgba(34,197,94,0.3);
        }
        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(34,197,94,0.4);
        }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .status-msg {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
            display: none;
        }
        .status-msg.success { display: block; background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
        .status-msg.error { display: block; background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
        .status-msg.info { display: block; background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }

        @media (max-width: 768px) {
            body { padding-top: 75px; }
            main { padding: 1.25rem 1rem; max-width: 100%; }
            h1 { font-size: clamp(1.5rem, 6vw, 2rem); margin-bottom: 1.25rem; }
            .form-container { padding: 1.25rem; border-radius: 18px; box-shadow: 0 6px 24px rgba(0,0,0,0.25); }
            input[type="text"] { padding: 0.8rem 1rem; font-size: 16px; border-radius: var(--radius); margin-bottom: 1rem; }
            #editor-container { height: clamp(220px, 38vh, 350px); border-radius: var(--radius); margin-bottom: 1rem; }
            .ql-toolbar.ql-snow { padding: 0.45rem 0.6rem; }
            .ql-toolbar.ql-snow button { width: 30px; height: 30px; padding: 4px; }
            .ql-editor { font-size: 0.95rem; min-height: clamp(180px, 32vh, 300px); }
            .btn-submit { width: 100%; padding: 0.9rem 1.25rem; font-size: 1rem; min-height: 52px; }
        }

        @media (max-width: 480px) {
            body { padding-top: 70px; }
            main { padding: 0.875rem 0.625rem; }
            h1 { font-size: clamp(1.35rem, 6.5vw, 1.7rem); margin-bottom: 1rem; }
            .form-container { padding: 1rem 0.875rem; border-radius: 14px; border: 1px solid rgba(255,255,255,0.12); }
            input[type="text"] { padding: 0.85rem 0.875rem; font-size: 16px; border-radius: 10px; margin-bottom: 0.875rem; }
            #editor-container { height: clamp(200px, 36vh, 300px); border-radius: 10px; margin-bottom: 0.875rem; }
            .ql-toolbar.ql-snow { padding: 0.35rem 0.45rem; }
            .ql-toolbar.ql-snow button { width: 28px; height: 28px; padding: 3px; }
            .ql-toolbar.ql-snow .ql-formats { margin-right: 6px; }
            .ql-editor { font-size: 0.9rem; min-height: clamp(160px, 30vh, 260px); padding: 0.75rem; }
            .btn-submit { width: 100%; padding: 0.85rem 1rem; font-size: 0.95rem; min-height: 52px; border-radius: var(--radius); }
        }
    </style>
</head>
<body>
    {% include '_header.html' %}
    <main>
        <h1>Create a New Post</h1>
        <div class="form-container">
            <form id="postForm">
                <input type="text" id="postTitle" name="title" placeholder="Enter post title" required />
                <div id="editor-container"></div>
                <button type="submit" class="btn-submit" id="submitBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M15.854.146a.5.5 0 0 0-.707 0L.146 15.146a.5.5 0 0 0 .707.708L6 11.207V14.5a.5.5 0 0 0 1 0v-3.293l5.146 5.147a.5.5 0 0 0 .708-.707L6.707 10.5H14.5a.5.5 0 0 0 0-1H6.707l9.147-9.146a.5.5 0 0 0 0-.708z"/>
                    </svg>
                    Publish Post
                </button>
                <div class="status-msg" id="statusMsg"></div>
            </form>
        </div>
    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        const quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ header: [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    ['image', 'code-block'],
                    [{ list: 'ordered' }, { list: 'bullet' }],
                    ['clean']
                ]
            },
            placeholder: 'Write your post content here...'
        });

        const postForm = document.getElementById('postForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMsg');

        function showStatus(text, type) {
            statusMsg.textContent = text;
            statusMsg.className = 'status-msg ' + type;
        }

        function clearStatus() {
            statusMsg.className = 'status-msg';
            statusMsg.textContent = '';
        }

        postForm.addEventListener('submit', function(e) {
            e.preventDefault();
            clearStatus();

            const title = document.getElementById('postTitle').value.trim();
            const content = quill.root.innerHTML;

            if (!title) { showStatus('Please enter a post title.', 'error'); return; }
            if (quill.getText().trim().length === 0) { showStatus('Please enter some content for your post.', 'error'); return; }

            submitBtn.disabled = true;
            showStatus('Publishing...', 'info');

            fetch('/api/profile/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({
                    title: title,
                    content: content,
                    category: 'general',
                    status: 'published'
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    showStatus('Post published successfully! Redirecting...', 'success');
                    quill.setContents([]);
                    document.getElementById('postTitle').value = '';
                    setTimeout(() => { window.location.href = '/newsroom'; }, 1200);
                } else {
                    showStatus('Error: ' + (data.message || 'Failed to publish'), 'error');
                    submitBtn.disabled = false;
                }
            })
            .catch(error => {
                showStatus('Network error: ' + error.message, 'error');
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
