<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1051868467240944"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for an Orumba North LGA account.">
    <title>Register — Orumba North LGA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/global-theme.css">
    <link rel="stylesheet" href="/static/css/navbar.css">
    <link rel="stylesheet" href="/static/css/mobile-global.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            font-family: 'Inter', sans-serif;
        }
        .register-container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: var(--text-2xl);
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 0.875rem 1rem;
            margin-bottom: 1.25rem;
            border-radius: var(--radius);
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.06);
            font-size: 16px;
            color: white;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
        }
        input::placeholder { color: rgba(255,255,255,0.4); }
        button[type="submit"] {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            border-radius: var(--radius);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(34,197,94,0.3);
            font-family: 'Inter', sans-serif;
        }
        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(34,197,94,0.4);
        }
        .message {
            margin-top: 1rem;
            text-align: center;
            font-weight: 600;
            min-height: 1.5rem;
        }
        .link {
            margin-top: 1.5rem;
            text-align: center;
        }
        .link a {
            color: #22c55e;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .link a:hover { color: #4ade80; text-decoration: underline; }
        .link p { color: rgba(255,255,255,0.7); margin: 0; font-size: 0.9rem; }

        @media (max-width: 480px) {
            .register-container { padding: 2rem 1.5rem; }
            h1 { font-size: var(--text-xl); }
        }
    </style>
</head>
<body>
    <div class="register-container" role="main" aria-labelledby="register-title">
        <h1 id="register-title">Create Account</h1>
        <form id="register-form" aria-describedby="register-message">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username" placeholder="Choose a username" />
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Choose a password" />
            <button type="submit">Register</button>
            <div id="register-message" class="message" role="alert" aria-live="assertive"></div>
        </form>
        <div class="link">
            <p>Already have an account? <a href="/login">Login here</a></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('register-form');
        const messageDiv = document.getElementById('register-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageDiv.textContent = '';
            messageDiv.style.color = '';
            const username = form.username.value.trim();
            const password = form.password.value.trim();

            if (!username || !password) {
                messageDiv.style.color = '#f87171';
                messageDiv.textContent = 'Please enter both username and password.';
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    messageDiv.style.color = '#4ade80';
                    messageDiv.textContent = 'Registration successful! Redirecting...';
                    setTimeout(() => { window.location.href = '/login'; }, 1500);
                } else {
                    messageDiv.style.color = '#f87171';
                    messageDiv.textContent = data.message || 'Registration failed.';
                }
            } catch (error) {
                messageDiv.style.color = '#f87171';
                messageDiv.textContent = 'An error occurred. Please try again.';
            }
        });
    </script>
</body>
</html>
