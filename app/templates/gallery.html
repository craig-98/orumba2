<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Orumba North LGA</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/glassmorphism.css">
    <link rel="stylesheet" href="/static/css/global-theme.css">
    <link rel="stylesheet" href="/static/css/header-enhancements.css">
    <style>
        body {
            background: radial-gradient(circle at center, rgba(0,100,0,0.08) 0%, transparent 70%), linear-gradient(135deg, rgba(255,221,87,0.04) 0%, rgba(34,197,94,0.04) 100%);
            min-height: 100vh;
            padding-top: var(--navbar-h, 75px);
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 4rem 2rem 6rem;
        }

        .page-title {
            text-align: center;
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #22c55e, #16a34a, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4rem;
            letter-spacing: -0.02em;
        }

        .page-title::after {
            content: '';
            display: block;
            height: 4px;
            width: 120px;
            background: linear-gradient(90deg, #22c55e, #FFD700);
            margin: 1rem auto 0;
            border-radius: 2px;
            box-shadow: 0 2px 10px rgba(34,197,94,0.4);
        }

        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 2.5rem;
        }

        .album-card {
            @extend .glass-card;
            position: relative;
            height: 420px;
            overflow: hidden;
            cursor: pointer;
        }

        .album-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 25px 70px rgba(0, 50, 0, 0.4), 0 0 30px rgba(34, 197, 94, 0.25);
        }

        .album-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .album-card:hover .album-cover {
            transform: scale(1.05);
        }

        .album-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent 0%, rgba(0,0,0,0.85) 30%);
            color: white;
            padding: 2rem;
            transform: translateY(100%);
            transition: transform 0.4s ease 0.1s;
        }

        .album-card:hover .album-overlay {
            transform: translateY(0);
        }

        .album-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .album-author {
            font-size: 1.1rem;
            opacity: 0.95;
            margin-bottom: 0.5rem;
        }

        .album-stats {
            display: flex;
            gap: 1.5rem;
            font-size: 1rem;
            opacity: 0.9;
        }

        .album-stats span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Album Modal - Premium Glass */
        .album-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .album-photos {
            position: relative;
            max-width: 95vw;
            max-height: 95vh;
            display: flex;
            align-items: center;
        }

        .photo-container {
            position: relative;
            width: 700px;
            height: 500px;
            flex-shrink: 0;
            border-radius: 24px;
            overflow: hidden;
            @extend .glass-card;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }

        .photo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: rgba(255,255,255,0.05);
        }

        .modal-nav {
            @extend .glass-card;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            color: white;
            font-size: 2.5rem;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(20px);
        }

        .modal-nav:hover {
            background: rgba(34,197,94,0.3);
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 15px 40px rgba(34,197,94,0.4);
        }

        .modal-prev { left: -100px; }
        .modal-next { right: -100px; }

        .modal-close {
            @extend .glass-card;
            position: absolute;
            top: -70px;
            right: 0;
            border: none;
            color: white;
            font-size: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }

        .modal-close:hover {
            background: rgba(239,68,68,0.3);
            transform: scale(1.1);
        }

        .album-thumbs {
            position: absolute;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            padding: 1rem;
            max-width: 85vw;
            overflow-x: auto;
            scrollbar-width: thin;
        }

        .thumb {
            width: 90px;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            flex-shrink: 0;
        }

        .thumb:hover, .thumb.active {
            opacity: 1;
            border-color: #22c55e;
            transform: scale(1.15);
            box-shadow: 0 10px 30px rgba(34,197,94,0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-container { padding: 2rem 1rem; }
            .albums-grid { grid-template-columns: 1fr; gap: 2rem; }
            .photo-container { width: 90vw; height: 60vh; }
            .modal-nav { font-size: 2rem; width: 60px; height: 60px; }
            .modal-prev { left: -60px; }
            .modal-next { right: -60px; }
        }
    </style>
</head>
<body>
    {% include '_header.html' %}

    <main class="main-container">
        <div class="glass-card fade-in-up text-center py-5" style="backdrop-filter: blur(25px); margin-bottom: 4rem; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,50,0,0.4);">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="#22c55e" style="margin-bottom: 1.5rem; filter: drop-shadow(0 5px 20px rgba(34,197,94,0.5));">
                <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
            </svg>
            <h1 style="font-size: 3.5rem; font-weight: 800; background: linear-gradient(135deg, #22c55e, #16a34a, #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 0.5rem; letter-spacing: -0.02em;">Orumba North Gallery</h1>
            <div style="height: 4px; width: 120px; background: linear-gradient(90deg, #22c55e, #FFD700); margin: 0 auto; border-radius: 2px; box-shadow: 0 2px 10px rgba(34,197,94,0.4);"></div>
        </div>
        
        <div class="albums-grid" id="albumsGrid">
            <!-- Album cards loaded here -->
        </div>
    </main>

    <!-- Album Modal -->
    <div id="albumModal" class="album-modal">
        <button class="modal-close" onclick="closeAlbumModal()">&times;</button>
        
        <div class="album-photos">
            <button class="modal-nav modal-prev" onclick="prevPhoto()">←</button>
            <div class="photo-container">
                <img id="currentPhoto" class="photo" src="" alt="">
            </div>
            <button class="modal-nav modal-next" onclick="nextPhoto()">→</button>
            
            <div class="album-thumbs" id="albumThumbs"></div>
        </div>
    </div>

    {% include '_footer.html' %}

    <script>
        let currentAlbum = null;
        let currentPhotoIndex = 0;

        async function loadAlbums() {
            try {
                const response = await fetch('/api/albums');
                const data = await response.json();
                if (data.status === 'success' && data.albums.length > 0) {
                    renderAlbumCards(data.albums);
                } else {
                    document.getElementById('albumsGrid').innerHTML = `
                        <div class="glass-card" style="text-align: center; padding: 4rem; grid-column: 1/-1;">
                            <h3 style="color: rgba(255,255,255,0.9);">No albums available yet</h3>
                            <p style="color: rgba(255,255,255,0.7);">Check back soon for community photo galleries</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('albumsGrid').innerHTML = `
                    <div class="glass-card" style="text-align: center; padding: 4rem; grid-column: 1/-1;">
                        <h3 style="color: rgba(255,255,255,0.9);">Loading albums...</h3>
                    </div>
                `;
            }
        }

        function renderAlbumCards(albums) {
            const grid = document.getElementById('albumsGrid');
            grid.innerHTML = '';
            
            albums.forEach((album, index) => {
                const card = document.createElement('div');
                card.className = 'album-card fade-in-up';
                card.style.animationDelay = `${index * 0.1}s`;
                card.onclick = () => openAlbumModal(album);
                
                const coverImg = album.posts[0]?.image_url || '/static/images/orumba-north-logo.jpg';
                const numPhotos = album.posts.length;
                
                card.innerHTML = `
                    <img class="album-cover" src="${coverImg}" alt="Album cover" loading="lazy">
                    <div class="album-overlay">
                        <div class="album-title">Album #${album.id}</div>
                        <div class="album-author">by Community</div>
                        <div class="album-stats">
                            <span>📸 ${numPhotos} photos</span>
                            <span>⭐ ${Math.round(Math.random()*5)}.0 rating</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openAlbumModal(album) {
            currentAlbum = album;
            currentPhotoIndex = 0;
            document.getElementById('albumModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            showCurrentPhoto();
            renderAlbumThumbnails();
        }

        function closeAlbumModal() {
            document.getElementById('albumModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            currentAlbum = null;
        }

        function showCurrentPhoto() {
            const photo = document.getElementById('currentPhoto');
            photo.src = currentAlbum.posts[currentPhotoIndex].image_url || '/static/images/orumba-north-logo.jpg';
            photo.alt = `Photo ${currentPhotoIndex + 1}`;
        }

        function prevPhoto() {
            currentPhotoIndex = (currentPhotoIndex - 1 + currentAlbum.posts.length) % currentAlbum.posts.length;
            showCurrentPhoto();
            updateThumbActive();
        }

        function nextPhoto() {
            currentPhotoIndex = (currentPhotoIndex + 1) % currentAlbum.posts.length;
            showCurrentPhoto();
            updateThumbActive();
        }

        function renderAlbumThumbnails() {
            const thumbsContainer = document.getElementById('albumThumbs');
            thumbsContainer.innerHTML = '';
            
            currentAlbum.posts.forEach((post, index) => {
                const thumb = document.createElement('img');
                thumb.className = 'thumb';
                thumb.src = post.image_url || '/static/images/orumba-north-logo.jpg';
                thumb.alt = `Thumbnail ${index + 1}`;
                thumb.onclick = (e) => {
                    e.stopPropagation();
                    currentPhotoIndex = index;
                    showCurrentPhoto();
                    updateThumbActive();
                };
                thumbsContainer.appendChild(thumb);
            });
            updateThumbActive();
        }

        function updateThumbActive() {
            const thumbs = document.querySelectorAll('.thumb');
            thumbs.forEach((thumb, index) => {
                thumb.classList.toggle('active', index === currentPhotoIndex);
            });
        }

        // Event listeners
        document.getElementById('albumModal').addEventListener('click', (e) => {
            if (e.target.id === 'albumModal') closeAlbumModal();
        });

        document.addEventListener('keydown', (e) => {
            if (!currentAlbum) return;
            if (e.key === 'ArrowLeft') prevPhoto();
            if (e.key === 'ArrowRight') nextPhoto();
            if (e.key === 'Escape') closeAlbumModal();
        });

        // Scroll animations
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.fade-in-up').forEach(el => {
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight * 0.8) {
                    el.style.animationPlayState = 'running';
                }
            });
        });

        // Load albums on page load
        window.addEventListener('load', loadAlbums);
    </script>
</body>
</html>
