<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1051868467240944"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Photo gallery of Orumba North LGA — community events, landmarks, and celebrations.">
    <title>Gallery — Orumba North LGA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/global-theme.css">
    <link rel="stylesheet" href="/static/css/navbar.css">
    <link rel="stylesheet" href="/static/css/mobile-global.css">
    <style>
        body {
            background: radial-gradient(circle at center, rgba(0,100,0,0.06) 0%, transparent 70%),
                        linear-gradient(135deg, rgba(255,221,87,0.03) 0%, rgba(34,197,94,0.03) 100%);
            min-height: 100vh;
            padding-top: 70px;
        }

        .gallery-hero {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2.5rem 1rem 2rem;
            text-align: center;
        }
        .gallery-hero-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            filter: drop-shadow(0 4px 16px rgba(34,197,94,0.4));
        }
        .gallery-hero h1 {
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: clamp(2rem, 6vw, 3.2rem);
            font-weight: 400;
            line-height: 1.1;
            background: linear-gradient(135deg, #22c55e, #16a34a, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 0.75rem;
        }
        .gallery-hero p {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: rgba(0,0,0,0.6);
            max-width: 500px;
            margin: 0.75rem auto 0;
            line-height: 1.5;
        }
        .gallery-divider {
            height: 4px;
            width: 100px;
            background: linear-gradient(90deg, #22c55e, #FFD700);
            margin: 0 auto;
            border-radius: 2px;
        }

        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem 3rem;
        }
        @media (min-width: 640px) {
            .albums-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 1024px) {
            .albums-grid { grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        }

        .album-card {
            position: relative;
            height: clamp(260px, 42vw, 380px);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,50,0,0.15);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
        }
        .album-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 20px 50px rgba(0,50,0,0.3), 0 0 20px rgba(34,197,94,0.2);
        }
        .album-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .album-card:hover img { transform: scale(1.05); }

        .album-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent 0%, rgba(0,0,0,0.75) 40%);
            color: white;
            padding: 1.25rem;
        }
        .album-overlay h3 { font-size: clamp(1.1rem, 3vw, 1.5rem); font-weight: 700; margin-bottom: 0.35rem; }
        .album-overlay p { font-size: clamp(0.8rem, 2vw, 0.95rem); opacity: 0.9; margin-bottom: 0.4rem; }
        .album-overlay .stats { display: flex; gap: 1rem; font-size: clamp(0.75rem, 2vw, 0.9rem); opacity: 0.85; }

        @media (hover: hover) and (pointer: fine) {
            .album-overlay { transform: translateY(100%); transition: transform 0.35s ease 0.05s; }
            .album-card:hover .album-overlay { transform: translateY(0); }
        }

        .album-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.94);
            backdrop-filter: blur(12px);
            z-index: 10000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .album-modal.active { display: flex; }

        .modal-top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            z-index: 10001;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
        }
        .modal-counter { color: rgba(255,255,255,0.9); font-size: 0.9rem; font-weight: 500; }
        .modal-close-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1.6rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.25s ease;
            padding: 0;
        }
        .modal-close-btn:hover { background: rgba(239,68,68,0.35); transform: scale(1.08); }

        .album-photos {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3.5rem 0.5rem 100px;
        }
        .photo-container {
            width: 100%;
            max-width: 900px;
            height: 100%;
            max-height: calc(100vh - 160px);
            border-radius: 16px;
            overflow: hidden;
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo-container img { width: 100%; height: 100%; object-fit: contain; }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.25s ease;
            z-index: 10001;
            padding: 0;
        }
        .modal-nav:hover { background: rgba(34,197,94,0.3); transform: translateY(-50%) scale(1.08); }
        .modal-prev { left: 0.5rem; }
        .modal-next { right: 0.5rem; }

        .album-thumbs {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            gap: 10px;
            padding: 0.75rem 1rem;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            z-index: 10001;
        }
        .album-thumbs::-webkit-scrollbar { display: none; }
        .thumb {
            width: 72px;
            height: 56px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.25s ease;
            border: 2px solid transparent;
            flex-shrink: 0;
        }
        .thumb:hover, .thumb.active { opacity: 1; border-color: #22c55e; transform: scale(1.08); }

        @media (min-width: 640px) {
            .gallery-hero { padding: 3rem 1.5rem 2.5rem; }
            .gallery-hero-icon { width: 72px; height: 72px; }
            .albums-grid { padding: 0 1.5rem 4rem; }
            .album-card { height: clamp(280px, 35vw, 360px); }
            .album-overlay { padding: 1.5rem; }
            .modal-nav { width: 52px; height: 52px; font-size: 1.75rem; }
            .modal-prev { left: 1rem; }
            .modal-next { right: 1rem; }
            .album-photos { padding: 4rem 1rem 110px; }
            .thumb { width: 80px; height: 62px; }
        }
        @media (min-width: 1024px) {
            .gallery-hero { padding: 4rem 2rem 3rem; }
            .gallery-hero-icon { width: 80px; height: 80px; }
            .albums-grid { padding: 0 2rem 5rem; }
            .album-card { height: 380px; border-radius: 24px; }
            .modal-nav { width: 60px; height: 60px; font-size: 2rem; }
            .modal-prev { left: 1.5rem; }
            .modal-next { right: 1.5rem; }
            .photo-container { border-radius: 24px; }
            .thumb { width: 90px; height: 68px; border-radius: 12px; }
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            grid-column: 1 / -1;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .empty-state h3 { font-family: 'DM Serif Display', Georgia, serif; font-size: clamp(1.3rem, 4vw, 1.8rem); color: rgba(0,0,0,0.85); margin-bottom: 0.5rem; }
        .empty-state p { font-size: clamp(0.85rem, 2.5vw, 1rem); color: rgba(0,0,0,0.6); }
    </style>
</head>
<body>
    {% include '_header.html' %}

    <div class="gallery-hero">
        <svg class="gallery-hero-icon" viewBox="0 0 24 24" fill="#22c55e">
            <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
        </svg>
        <h1>Orumba North Gallery</h1>
        <div class="gallery-divider"></div>
        <p>Explore photos from our vibrant community events and landmarks</p>
    </div>

    <main>
        <div class="albums-grid" id="albumsGrid">
            <!-- JS populates -->
        </div>
    </main>

    <div id="albumModal" class="album-modal">
        <div class="modal-top-bar">
            <span class="modal-counter" id="photoCounter">1 / 1</span>
            <button class="modal-close-btn" onclick="closeAlbumModal()" aria-label="Close">&times;</button>
        </div>
        <div class="album-photos">
            <button class="modal-nav modal-prev" onclick="prevPhoto()" aria-label="Previous">&#8249;</button>
            <div class="photo-container">
                <img id="currentPhoto" src="" alt="">
            </div>
            <button class="modal-nav modal-next" onclick="nextPhoto()" aria-label="Next">&#8250;</button>
            <div class="album-thumbs" id="albumThumbs"></div>
        </div>
    </div>

    {% include '_footer.html' %}

    <script>
        let currentAlbum = null;
        let currentPhotoIndex = 0;

        async function loadAlbums() {
            try {
                const response = await fetch('/api/public/albums');
                const data = await response.json();
                if (data.status === 'success' && data.albums.length > 0) {
                    renderAlbumCards(data.albums);
                } else {
                    showEmptyState();
                }
            } catch (error) {
                showEmptyState();
            }
        }

        function showEmptyState() {
            document.getElementById('albumsGrid').innerHTML = `
                <div class="empty-state">
                    <h3>No albums available yet</h3>
                    <p>Check back soon for community photo galleries</p>
                </div>
            `;
        }

        function renderAlbumCards(albums) {
            const grid = document.getElementById('albumsGrid');
            grid.innerHTML = '';
            albums.forEach((album, index) => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                card.onclick = () => openAlbumModal(album);
                const coverImg = album.posts[0]?.image_url || '/static/images/orumba-north-logo.jpg';
                const numPhotos = album.posts.length;
                card.innerHTML = `
                    <img src="${coverImg}" alt="Album cover" loading="lazy">
                    <div class="album-overlay">
                        <h3>Album #${album.id}</h3>
                        <p>by Community</p>
                        <div class="stats">
                            <span>&#128247; ${numPhotos} photo${numPhotos !== 1 ? 's' : ''}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
                setTimeout(() => {
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, index * 80);
            });
        }

        function openAlbumModal(album) {
            currentAlbum = album;
            currentPhotoIndex = 0;
            document.getElementById('albumModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            showCurrentPhoto();
            renderAlbumThumbnails();
            updateCounter();
        }

        function closeAlbumModal() {
            document.getElementById('albumModal').classList.remove('active');
            document.body.style.overflow = '';
            currentAlbum = null;
        }

        function showCurrentPhoto() {
            const photo = document.getElementById('currentPhoto');
            photo.src = currentAlbum.posts[currentPhotoIndex].image_url || '/static/images/orumba-north-logo.jpg';
            photo.alt = `Photo ${currentPhotoIndex + 1} of ${currentAlbum.posts.length}`;
            updateCounter();
        }

        function updateCounter() {
            const counter = document.getElementById('photoCounter');
            if (counter && currentAlbum) {
                counter.textContent = `${currentPhotoIndex + 1} / ${currentAlbum.posts.length}`;
            }
        }

        function prevPhoto() {
            if (!currentAlbum) return;
            currentPhotoIndex = (currentPhotoIndex - 1 + currentAlbum.posts.length) % currentAlbum.posts.length;
            showCurrentPhoto();
            updateThumbActive();
        }

        function nextPhoto() {
            if (!currentAlbum) return;
            currentPhotoIndex = (currentPhotoIndex + 1) % currentAlbum.posts.length;
            showCurrentPhoto();
            updateThumbActive();
        }

        function renderAlbumThumbnails() {
            const thumbsContainer = document.getElementById('albumThumbs');
            thumbsContainer.innerHTML = '';
            currentAlbum.posts.forEach((post, index) => {
                const thumb = document.createElement('img');
                thumb.className = 'thumb';
                thumb.src = post.image_url || '/static/images/orumba-north-logo.jpg';
                thumb.alt = `Thumbnail ${index + 1}`;
                thumb.loading = 'lazy';
                thumb.onclick = (e) => {
                    e.stopPropagation();
                    currentPhotoIndex = index;
                    showCurrentPhoto();
                    updateThumbActive();
                };
                thumbsContainer.appendChild(thumb);
            });
            updateThumbActive();
        }

        function updateThumbActive() {
            document.querySelectorAll('.thumb').forEach((thumb, index) => {
                thumb.classList.toggle('active', index === currentPhotoIndex);
                if (index === currentPhotoIndex) {
                    thumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                }
            });
        }

        let touchStartX = 0;
        let touchEndX = 0;
        const modal = document.getElementById('albumModal');
        modal.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        modal.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) nextPhoto();
                else prevPhoto();
            }
        }, { passive: true });

        modal.addEventListener('click', (e) => {
            if (e.target === modal || e.target.closest('.album-photos') === e.target) closeAlbumModal();
        });

        document.addEventListener('keydown', (e) => {
            if (!currentAlbum) return;
            if (e.key === 'ArrowLeft') prevPhoto();
            if (e.key === 'ArrowRight') nextPhoto();
            if (e.key === 'Escape') closeAlbumModal();
        });

        window.addEventListener('load', loadAlbums);
    </script>
</body>
</html>
